<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tyk Tyk Web Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <!-- Основной контейнер приложения -->
    <div id="app-container">
        
        <!-- ЛЕНТА ВИДЕО (Главный экран) -->
        <div id="video-feed" class="page-section active">
            <!-- Сюда JavaScript будет динамически добавлять видео-карточки -->
        </div>

        <!-- ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ -->
        <div id="profile-section" class="page-section" style="display: none;">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <div class="profile-tag">@dimka_0770</div>
                <div class="profile-bio">Разработчик Tyk Tyk Clone 🚀</div>
            </div>
            <!-- Сетка с загруженными видео -->
            <div id="profile-grid">
                <div id="grid-empty-msg" style="color: #aaa; text-align: center; padding: 20px;">Здесь будут ваши видео</div>
            </div>
        </div>

    </div>

    <!-- СКРЫТЫЙ ИНПУТ ДЛЯ ВЫБОРА ФАЙЛА (Обязателен для работы галереи на iOS) -->
    <input type="file" id="video-upload-input" accept="video/*" style="display: none;">
    <!-- НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ -->
    <div id="bottom-nav">
        <div class="nav-btn active" id="btn-home">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Главная</span>
        </div>
        <div class="nav-btn">
            <span class="nav-icon">🔍</span>
            <span class="nav-text">Интересное</span>
        </div>
        
        <!-- Центральная кнопка загрузки [+] -->
        <div class="nav-btn plus-container" id="plus-btn">
            <div class="plus-icon-box">+</div>
        </div>
        
        <div class="nav-btn">
            <span class="nav-icon">⚡</span>
            <span class="nav-text">Входящие</span>
        </div>
        <div class="nav-btn" id="btn-profile">
            <span class="nav-icon">👤</span>
            <span class="nav-text">Профиль</span>
        </div>
    </div>

    <!-- ==================== ИСПРАВЛЕННОЕ ПОДКЛЮЧЕНИЕ СКРИПТОВ ==================== -->
    
    <!-- 1. Сначала загружаем официальное ядро SDK Supabase с CDN -->
    <script src="https://jsdelivr.net"></script>

    <!-- 2. Затем файл вашей конфигурации с правильным URL проекта -->
    <script src="supabase-config.js"></script>

    <!-- 3. И в самом конце подключаем логику приложения app.js -->
    <script src="app.js"></script>

    <!-- Регистрация Service Worker для PWA (если необходима) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('Service Worker успешно зарегистрирован!'))
                .catch((err) => console.log('Ошибка Service Worker:', err));
        }
    </script>
</body>
</html>
