<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyk Tyk</title>
    <!-- Подключаем внешний файл со стилями -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- Лента вертикальных видео -->
    <div class="tiktok-container">
        
        <!-- РОЛИК 1 -->
        <div class="video-card">
            <!-- Официальный тестовый поток Apple (Пляж) -->
            <video src="https://apple.com" loop playsinline autoplay muted></video>
            
            <div class="action-buttons">
                <div class="button-item" onclick="toggleLike(this)">
                    <div class="button-icon">❤️</div>
                    <span class="count">12.5K</span>
                </div>
                <div class="button-item" onclick="alert('Комментарии в разработке!')">
                    <div class="button-icon">💬</div>
                    <span class="count">342</span>
                </div>
                <div class="button-item" onclick="shareVideo()">
                    <div class="button-icon">➡️</div>
                    <span class="count">Поделиться</span>
                </div>
            </div>

            <div class="video-sidebar">
                <div class="username">@dima0major</div>
                <div class="description">Тестируем официальные видео от Apple! Тапни по экрану, чтобы включить звук 🔊 #coding #tyktyk</div>
            </div>
        </div>

        <!-- РОЛИК 2 -->
        <div class="video-card">
            <!-- Второй официальный тестовый поток Apple -->
            <video src="https://apple.com" loop playsinline muted></video>
            
            <div class="action-buttons">
                <div class="button-item" onclick="toggleLike(this)">
                    <div class="button-icon">❤️</div>
                    <span class="count">8.1K</span>
                </div>
                <div class="button-item" onclick="alert('Комментарии в разработке!')">
                    <div class="button-icon">💬</div>
                    <span class="count">98</span>
                </div>
                <div class="button-item" onclick="shareVideo()">
                    <div class="button-icon">➡️</div>
                    <span class="count">Поделиться</span>
                </div>
            </div>

            <div class="video-sidebar">
                <div class="username">@it_developer</div>
                <div class="description">Свайпни вверх или вниз, чтобы проверить переключение роликов! 🔥</div>
            </div>
        </div>

    </div>

    <!-- Нижнее меню навигации -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="alert('Поиск скоро появится')">
            <span class="nav-icon">🔍</span>
            <span>Интересное</span>
        </div>
        <div class="nav-item" onclick="alert('Тут будет загрузка видео')">
            <div class="nav-create">+</div>
        </div>
        <div class="nav-item" onclick="alert('Входящие пусты')">
            <span class="nav-icon">⚡</span>
            <span>Входящие</span>
        </div>
        <div class="nav-item" onclick="alert('Профиль пользователя')">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </div>
    </div>

    <!-- БЛОК СЦЕНАРИЕВ (JavaScript) -->
    <script>
        const container = document.querySelector('.tiktok-container');
        const videos = document.querySelectorAll('video');

        // Управление воспроизведением при скролле
        container.addEventListener('scroll', () => {
            videos.forEach(video => {
                const rect = video.getBoundingClientRect();
                if (rect.top >= -50 && rect.top < window.innerHeight / 2) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            });
        });

        // Включение звука и пауза по клику
        videos.forEach(video => {
            video.addEventListener('click', () => {
                if (video.muted) {
                    video.muted = false; // Убираем беззвучный режим на iOS при первом тапе
                }
                if (video.paused) {
                    video.play().catch(err => console.log("Ошибка воспроизведения:", err));
                } else {
                    video.pause();
                }
            });
        });

        // Система лайков
        function toggleLike(element) {
            element.classList.toggle('liked');
            const countSpan = element.querySelector('.count');
            let currentCount = parseFloat(countSpan.innerText);
            
            if (element.classList.contains('liked')) {
                if (!isNaN(currentCount)) countSpan.innerText = (currentCount + 0.1).toFixed(1) + 'K';
            } else {
                if (!isNaN(currentCount)) countSpan.innerText = (currentCount - 0.1).toFixed(1) + 'K';
            }
        }

        // Поделиться роликом
        function shareVideo() {
            if (navigator.share) {
                navigator.share({
                    title: 'Смотри Tyk Tyk!',
                    url: window.location.href
                }).catch(() => {});
            } else {
                alert('Ссылка скопирована!');
            }
        }
    </script>
</body>
</html>
